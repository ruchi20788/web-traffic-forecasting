<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Web Traffic Forecaster</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(rgba(10, 15, 25, 0.75), rgba(10, 15, 25, 0.75)),
        url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1950&q=80");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* light streak overlay */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255,0,80,0.15),
        rgba(0,200,255,0.15),
        rgba(255,255,255,0.05)
      );
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 35px 32px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
    }

    .forecast-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 15px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff416c, #007bff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .app-title {
      text-align: center;
      font-weight: 600;
      color: #1f2937;
    }

    .app-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 22px;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px;
      font-size: 0.9rem;
    }

    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 0.15rem rgba(0,123,255,0.25);
    }

    .btn-primary {
      border-radius: 12px;
      padding: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #ff416c, #007bff);
      border: none;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .footer-text {
      margin-top: 18px;
      text-align: center;
      font-size: 0.75rem;
      color: #6b7280;
    }

    .footer-text span {
      font-weight: 500;
      color: #007bff;
    }
  </style>
</head>

<body>

  <div class="login-card">

    <div class="forecast-icon">🚦</div>

    <h4 class="app-title">Web Traffic Forecasting</h4>
    <p class="app-subtitle">
      Time Series Analysis · Predict Future Trends
    </p>

    {% if error %}
      <div class="alert alert-danger text-center py-2">
        {{ error }}
      </div>
    {% endif %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        Login to Dashboard
      </button>
    </form>

    <div class="footer-text">
      © 2025 <span>Web Traffic Time Series System</span>
    </div>

  </div>

</body>
</html>
